version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}   # set in .env
    volumes:
      - ./backend:/app          # hot-reload for local dev
      - ./datasets:/datasets    # sample CSVs accessible at /datasets
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

